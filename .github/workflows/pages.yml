name: Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: cachix/install-nix-action@v31

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2.9.1
        with:
          shared-key: workstation-web
          workspaces: web/workstation -> target
          cache-bin: "false"
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cmd-format: nix develop ${{ github.workspace }}#workstation-web --command {0}

      - name: Cache Trunk tools
        uses: actions/cache@v4
        with:
          path: ~/.cache/trunk
          key: ${{ runner.os }}-trunk-tools-${{ hashFiles('flake.lock', 'web/workstation/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-trunk-tools-

      - name: Export upstream metadata
        run: |
          {
            echo "DOTFILES_GENERATOR_UPSTREAM_REV=$(git rev-parse HEAD)"
          } >> "$GITHUB_ENV"

      - name: Build workstation generator
        run: nix develop ../..#workstation-web --command trunk build --release --public-url /
        working-directory: web/workstation

      - name: Check Pages asset paths
        run: |
          if grep -n '/dotfiles/' dist/index.html; then
            echo "Unexpected /dotfiles/ asset path in Pages build" >&2
            exit 1
          fi
        working-directory: web/workstation

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: web/workstation/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
